<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Maison — Manager Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1117;
  --s1: #151b22;
  --s2: #1c2330;
  --s3: #222b38;
  --border: #253040;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --green: #2e7d52;
  --green2: #4caf7d;
  --red: #c0392b;
  --red2: #e74c3c;
  --amber: #e6a817;
  --text: #dde3ec;
  --muted: #637080;
  --dim: #3a4758;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== TOPBAR ===== */
.topbar {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.topbar-logo {
  font-family: 'Playfair Display', serif;
  font-size: 19px;
  font-weight: 700;
  color: var(--gold2);
}
.live-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(76,175,125,0.1);
  border: 1px solid rgba(76,175,125,0.25);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 11px;
  color: var(--green2);
  font-weight: 500;
  letter-spacing: 0.8px;
}
.live-dot {
  width: 6px; height: 6px;
  background: var(--green2);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--green2);
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

.topbar-kpis {
  display: flex;
  gap: 28px;
}
.kpi { text-align: center; }
.kpi-v {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold2);
}
.kpi-l {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}
.btn-reset {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-reset:hover { color: var(--red2); border-color: rgba(231,76,60,0.4); background: rgba(231,76,60,0.07); }

/* ===== LAYOUT ===== */
.layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  flex: 1;
  overflow: hidden;
}

/* ===== MAIN PANEL ===== */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

/* Now Serving */
.ns-panel {
  background: linear-gradient(135deg, #141e18, #192b20);
  border-bottom: 1px solid rgba(76,175,125,0.15);
  padding: 22px 26px;
  flex-shrink: 0;
}
.ns-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.ns-left {}
.ns-eyebrow {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--green2);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.ns-token {
  font-family: 'Playfair Display', serif;
  font-size: 52px;
  font-weight: 700;
  color: var(--gold2);
  line-height: 1;
}
.ns-name {
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
  margin-top: 6px;
}
.ns-chips {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}
.chip {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 100px;
  background: rgba(255,255,255,0.06);
  color: var(--muted);
  font-weight: 400;
}
.ns-right {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 11px 20px;
  border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

.btn-call {
  background: var(--green);
  color: white;
  box-shadow: 0 4px 16px rgba(46,125,82,0.35);
}
.btn-call:not(:disabled):hover { background: var(--green2); box-shadow: 0 6px 22px rgba(76,175,125,0.4); }

.btn-seat {
  background: rgba(76,175,125,0.12);
  color: var(--green2);
  border: 1px solid rgba(76,175,125,0.28);
}
.btn-seat:not(:disabled):hover { background: rgba(76,175,125,0.22); }

.btn-skip {
  background: rgba(230,168,23,0.1);
  color: var(--amber);
  border: 1px solid rgba(230,168,23,0.25);
}
.btn-skip:not(:disabled):hover { background: rgba(230,168,23,0.2); }

.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}
.icon-btn:hover { color: var(--red2); border-color: rgba(231,76,60,0.4); background: rgba(231,76,60,0.09); }

/* Queue list section */
.queue-section {
  flex: 1;
  overflow-y: auto;
  padding: 18px 24px;
}
.queue-section::-webkit-scrollbar { width: 4px; }
.queue-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sec-hdr {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.count-badge {
  background: var(--s3);
  color: var(--muted);
  font-size: 10px;
  padding: 2px 9px;
  border-radius: 100px;
}

.q-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 14px 16px;
  margin-bottom: 9px;
  transition: all 0.18s;
  animation: fadeup 0.3s ease;
}
@keyframes fadeup { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.q-item:hover { border-color: #354555; background: var(--s2); }
.q-item.is-next { border-color: rgba(201,168,76,0.3); background: rgba(201,168,76,0.04); }

.q-num {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--dim);
  min-width: 26px;
  text-align: center;
}
.q-num.next { color: var(--gold); }

.q-info { flex: 1; min-width: 0; }
.q-token {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.next-tag {
  font-size: 9px;
  background: rgba(201,168,76,0.15);
  color: var(--gold2);
  padding: 2px 8px;
  border-radius: 100px;
  letter-spacing: 1px;
  font-weight: 600;
}
.q-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.q-right { text-align: right; flex-shrink: 0; }
.q-party {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.q-time {
  font-size: 11px;
  color: var(--dim);
  margin-top: 2px;
}

.empty-q {
  text-align: center;
  padding: 48px 20px;
  color: var(--dim);
}
.empty-q .ei { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
.empty-q p { font-size: 13px; line-height: 1.6; }

/* ===== SIDEBAR ===== */
.sidebar {
  background: var(--s1);
  overflow-y: auto;
  padding: 20px 18px;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sb-section { margin-bottom: 26px; }
.sb-title {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* Wait Estimate Box */
.est-box {
  background: linear-gradient(135deg, #191f2c, #1f2a3a);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 14px;
  padding: 18px;
  text-align: center;
  margin-bottom: 10px;
}
.est-big {
  font-family: 'Playfair Display', serif;
  font-size: 44px;
  font-weight: 700;
  color: var(--gold2);
  line-height: 1;
}
.est-unit {
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}
.est-note { font-size: 11px; color: var(--dim); margin-top: 8px; }

.mini-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.mini-card {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.mini-val {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.mini-lbl {
  font-size: 9px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 3px;
}

/* Activity Log */
.log-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  max-height: 320px;
  overflow-y: auto;
}
.log-list::-webkit-scrollbar { width: 3px; }
.log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.log-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  animation: fadeup 0.25s ease;
}
.log-row:last-child { border-bottom: none; }
.ld { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.ld-g { background: var(--green2); }
.ld-a { background: var(--amber); }
.ld-r { background: var(--red2); }
.ld-b { background: #60a5fa; }
.log-txt { flex: 1; line-height: 1.4; }
.log-t { font-size: 10px; color: var(--dim); flex-shrink: 0; }

.no-log { font-size: 12px; color: var(--dim); text-align: center; padding: 16px 0; }

/* Toast */
.tst-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; }
.tst {
  background: var(--s2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--green2);
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 13px;
  color: var(--text);
  animation: toast-in 0.3s ease;
  min-width: 200px;
}
@keyframes toast-in { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }

@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { border-top: 1px solid var(--border); }
  .topbar-kpis { gap: 14px; }
  body { overflow: auto; }
  .layout, .main { overflow: visible; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">🍽️ La Maison</div>
    <div class="live-pill"><span class="live-dot"></span> LIVE</div>
  </div>
  <div class="topbar-kpis">
    <div class="kpi"><div class="kpi-v" id="kpi-w">0</div><div class="kpi-l">Waiting</div></div>
    <div class="kpi"><div class="kpi-v" id="kpi-s">0</div><div class="kpi-l">Seated</div></div>
    <div class="kpi"><div class="kpi-v" id="kpi-t">0</div><div class="kpi-l">Total</div></div>
  </div>
  <button class="btn-reset" onclick="resetAll()">⟳ Reset Day</button>
</div>

<!-- Main Layout -->
<div class="layout">

  <!-- Main Panel -->
  <div class="main">

    <!-- Now Serving -->
    <div class="ns-panel">
      <div class="ns-top">
        <div class="ns-left">
          <div class="ns-eyebrow">
            <span class="live-dot"></span> NOW SERVING
          </div>
          <div class="ns-token" id="ns-tok">—</div>
          <div class="ns-name" id="ns-name">No active guest</div>
          <div class="ns-chips">
            <div class="chip" id="ns-party">—</div>
            <div class="chip" id="ns-phone">—</div>
            <div class="chip" id="ns-time">—</div>
          </div>
        </div>
        <div class="ns-right">
          <button class="btn btn-call" id="btn-next" onclick="callNext()">▶ Call Next</button>
          <button class="btn btn-seat" id="btn-seat" onclick="seatGuest()" disabled>✓ Seated</button>
          <button class="btn btn-skip" id="btn-skip" onclick="skipGuest()" disabled>↩ Skip</button>
        </div>
      </div>
    </div>

    <!-- Queue -->
    <div class="queue-section">
      <div class="sec-hdr">
        WAITING QUEUE
        <span class="count-badge" id="q-badge">0 groups</span>
      </div>
      <div id="q-list">
        <div class="empty-q"><div class="ei">🍽️</div><p>No guests in queue.<br>Waiting for check-ins.</p></div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="sb-section">
      <div class="sb-title">WAIT ESTIMATE</div>
      <div class="est-box">
        <div class="est-big" id="est-big">0</div>
        <div class="est-unit">Minutes</div>
        <div class="est-note" id="est-note">Queue is empty</div>
      </div>
      <div class="mini-stats">
        <div class="mini-card">
          <div class="mini-val" id="avg-p">—</div>
          <div class="mini-lbl">Avg Party</div>
        </div>
        <div class="mini-card">
          <div class="mini-val" id="mins-grp">12</div>
          <div class="mini-lbl">Min / Group</div>
        </div>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-title">ACTIVITY LOG</div>
      <div class="log-list" id="log-list">
        <div class="no-log">No activity yet</div>
      </div>
    </div>

  </div>
</div>

<div class="tst-wrap" id="tw"></div>

<script>
const STORE_KEY = 'lm_waitlist_v1';
const LOG_KEY   = 'lm_log_v1';
const AVG = 12;

let currentGuest = null;
let seatedCount = 0;
let totalCount = 0;

function nowT() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { list: [], counter: 1 }; }
  catch { return { list: [], counter: 1 }; }
}
function save(data) { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }

function loadLogs() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY)) || []; }
  catch { return []; }
}
function saveLogs(logs) { localStorage.setItem(LOG_KEY, JSON.stringify(logs.slice(0, 40))); }

function est(n) { return n <= 0 ? '< 5' : String(n * AVG); }

// ===== ACTIONS =====
function callNext() {
  const data = load();
  const next = data.list.find(g => g.status === 'waiting');
  if (!next) { toast('No guests waiting!', '#e8c97a'); return; }

  if (currentGuest) {
    const cg = data.list.find(g => g.id === currentGuest.id);
    if (cg && cg.status === 'calling') cg.status = 'waiting'; // requeue if not seated
  }

  next.status = 'calling';
  currentGuest = next;
  save(data);

  document.getElementById('ns-tok').textContent = next.token;
  document.getElementById('ns-name').textContent = next.name;
  document.getElementById('ns-party').textContent = `👥 ${next.party} people`;
  document.getElementById('ns-phone').textContent = `📞 ${next.phone}`;
  document.getElementById('ns-time').textContent = `⏱ Joined ${next.joinedAt}`;
  document.getElementById('btn-seat').disabled = false;
  document.getElementById('btn-skip').disabled = false;

  log(`Called ${next.token} — ${next.name}`, 'a');
  toast(`📢 Now calling ${next.token} — ${next.name}`, '#e8c97a');
  render();
}

function seatGuest() {
  if (!currentGuest) return;
  const data = load();
  const g = data.list.find(x => x.id === currentGuest.id);
  if (g) g.status = 'seated';
  save(data);

  seatedCount++;
  totalCount++;
  log(`${currentGuest.token} ${currentGuest.name} seated ✓`, 'g');
  toast(`✓ ${currentGuest.token} seated`, '#4caf7d');
  currentGuest = null;
  clearNS();
  render();
}

function skipGuest() {
  if (!currentGuest) return;
  const data = load();
  const idx = data.list.findIndex(x => x.id === currentGuest.id);
  if (idx !== -1) {
    const [g] = data.list.splice(idx, 1);
    g.status = 'waiting';
    data.list.push(g);
  }
  save(data);

  log(`${currentGuest.token} skipped → moved to end`, 'a');
  toast(`↩ ${currentGuest.token} moved to end`, '#e6a817');
  currentGuest = null;
  clearNS();
  render();
}

function removeGuest(id) {
  const data = load();
  const g = data.list.find(x => x.id === id);
  if (!g) return;
  data.list = data.list.filter(x => x.id !== id);
  save(data);

  if (currentGuest && currentGuest.id === id) {
    currentGuest = null;
    clearNS();
  }
  log(`${g.token} ${g.name} removed`, 'r');
  toast(`Removed ${g.token}`, '#e74c3c');
  render();
}

function clearNS() {
  document.getElementById('ns-tok').textContent = '—';
  document.getElementById('ns-name').textContent = 'No active guest';
  document.getElementById('ns-party').textContent = '—';
  document.getElementById('ns-phone').textContent = '—';
  document.getElementById('ns-time').textContent = '—';
  document.getElementById('btn-seat').disabled = true;
  document.getElementById('btn-skip').disabled = true;
}

function resetAll() {
  if (!confirm('Reset the entire day? All waitlist data will be cleared.')) return;
  localStorage.removeItem(STORE_KEY);
  localStorage.removeItem(LOG_KEY);
  currentGuest = null;
  seatedCount = 0;
  totalCount = 0;
  clearNS();
  render();
  renderLogs();
  toast('Day reset ✓', '#60a5fa');
}

// ===== RENDER =====
function render() {
  const data = load();
  const waiting = data.list.filter(g => g.status === 'waiting');
  const seated = data.list.filter(g => g.status === 'seated').length;

  document.getElementById('kpi-w').textContent = waiting.length;
  document.getElementById('kpi-s').textContent = seatedCount;
  document.getElementById('kpi-t').textContent = totalCount;
  document.getElementById('q-badge').textContent = `${waiting.length} group${waiting.length !== 1 ? 's' : ''}`;

  const estMins = waiting.length > 0 ? String(waiting.length * AVG) : '0';
  document.getElementById('est-big').textContent = estMins;
  document.getElementById('est-note').textContent = waiting.length > 0
    ? `${waiting.length} group${waiting.length !== 1 ? 's' : ''} ahead`
    : 'Queue is clear';

  if (waiting.length > 0) {
    const ap = (waiting.reduce((s, g) => s + g.party, 0) / waiting.length).toFixed(1);
    document.getElementById('avg-p').textContent = ap;
  } else {
    document.getElementById('avg-p').textContent = '—';
  }

  const list = document.getElementById('q-list');
  if (waiting.length === 0) {
    list.innerHTML = `<div class="empty-q"><div class="ei">🍽️</div><p>Queue is empty.<br>All caught up!</p></div>`;
    return;
  }

  list.innerHTML = waiting.map((g, i) => `
    <div class="q-item ${i === 0 ? 'is-next' : ''}">
      <div class="q-num ${i === 0 ? 'next' : ''}">${i + 1}</div>
      <div class="q-info">
        <div class="q-token">
          ${g.token}
          ${i === 0 ? '<span class="next-tag">NEXT</span>' : ''}
        </div>
        <div class="q-sub">${g.name} &middot; ${g.phone}</div>
      </div>
      <div class="q-right">
        <div class="q-party">👥 ${g.party}</div>
        <div class="q-time">${g.joinedAt}</div>
      </div>
      <button class="icon-btn" onclick="removeGuest(${g.id})" title="Remove">✕</button>
    </div>
  `).join('');
}

// ===== LOGS =====
function log(text, type) {
  const logs = loadLogs();
  logs.unshift({ text, type, t: nowT() });
  saveLogs(logs);
  renderLogs();
}

function renderLogs() {
  const logs = loadLogs();
  const el = document.getElementById('log-list');
  if (logs.length === 0) { el.innerHTML = '<div class="no-log">No activity yet</div>'; return; }
  el.innerHTML = logs.map(l => `
    <div class="log-row">
      <div class="ld ld-${l.type}"></div>
      <div class="log-txt">${l.text}</div>
      <div class="log-t">${l.t}</div>
    </div>
  `).join('');
}

// ===== TOAST =====
function toast(msg, color) {
  const t = document.createElement('div');
  t.className = 'tst';
  t.style.borderLeftColor = color || '#4caf7d';
  t.textContent = msg;
  document.getElementById('tw').appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ===== POLL (auto-refresh every 3s) =====
render();
renderLogs();
setInterval(() => { render(); renderLogs(); }, 3000);
